<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <!-- Script-load retry: catches transient QUIC/HTTP3/network failures and retries up to 2x -->
  <script>(function(){var seen={};document.addEventListener('error',function(e){var t=e.target;if(!t||t.tagName!=='SCRIPT')return;var src=t.src||'';if(!src||seen[src]>=2)return;seen[src]=(seen[src]||0)+1;var s=document.createElement('script');s.src=src+(src.indexOf('?')>=0?'&':'?')+'r='+Date.now();s.async=false;setTimeout(function(){document.head.appendChild(s);},400*seen[src]);console.warn('[script-retry]',src,'attempt',seen[src]);},true);})();</script>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>토큰 입금 승인 관리 · SilicaChain</title>
  <link rel="stylesheet" href="css/silica-admin.css?v=20260526v850-image-swap">
  <link rel="shortcut icon" href="/assets/images/logo.svg">
  <style>
    .admin-shell{max-width:1400px;margin:0 auto;padding:22px 16px}
    .admin-top{display:flex;justify-content:space-between;align-items:center;gap:12px}
    .admin-grid{display:grid;grid-template-columns:260px 1fr;gap:14px;margin-top:14px}
    @media (max-width: 900px){.admin-grid{grid-template-columns:1fr}}
    .admin-menu{display:flex;flex-direction:column;gap:10px}
    .admin-menu a{width:100%!important;display:flex!important;justify-content:flex-start!important;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-decoration:none}
    .admin-menu a.active{background:var(--accent-light); border:1px solid var(--amber-border); color:var(--accent-dark)}
    .mono{font-family:ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace}
    .timecol{ white-space:nowrap; min-width:170px; }

    /* 요약 카드 */
    .dep-summary{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:14px}
    .dep-summary .card{flex:1;min-width:140px;padding:14px 16px;text-align:center}
    .dep-summary .card .num{font-size:24px;font-weight:950;margin:4px 0}
    .dep-summary .card .label{font-size:12px;color:var(--muted)}

    /* 체크박스 컬럼 */
    .cb-col{width:36px;text-align:center}
    .cb-col input{width:16px;height:16px;cursor:pointer}

    /* 상태 배지 */
    .st-pending{color:#d97706;font-weight:700}
    .st-approved{color:#059669;font-weight:700}
    .st-rejected{color:#dc2626;font-weight:700}

    /* 행 하이라이트 */
    tr.row-pending{background:#fffbeb}
    tr.row-pending:hover{background:#fef3c7}

    /* 일괄 작업 바 */
    .batch-bar{display:none;align-items:center;gap:10px;padding:10px 14px;background:#fef3c7;border:1px solid #fde68a;border-radius:10px;margin-bottom:12px}
    .batch-bar.show{display:flex}

    /* 관리자 메모 */
    .admin-note-input{width:100%;min-width:100px;padding:4px 8px;border:1px solid var(--border,#e5e7eb);border-radius:8px;font-size:12px;background:var(--surface2,#f8f9fb);color:var(--text,#0f172a);outline:none;resize:none;font-family:inherit}
    .admin-note-input:focus{border-color:var(--accent,#f5c400);box-shadow:0 0 0 2px rgba(245,196,0,.15)}
    .admin-note-input::placeholder{color:var(--muted,#94a3b8)}
    .note-saved{color:#059669;font-size:11px;font-weight:700;opacity:0;transition:opacity .3s}
    .note-saved.show{opacity:1}
  </style>
</head>
<body data-asset-type="token">

<div id="toast" class="pill hidden"></div>

<div id="adminHeaderMount"></div>
<div class="admin-shell">
<div class="admin-grid">

<div class="card">
<div class="pad admin-menu">

<div class="muted">관리 메뉴</div>

</div>

  <div class="card">
    <div class="pad">
      <div class="row" style="align-items:flex-end">
        <div>
          <div style="font-weight:950;font-size:16px">토큰 입금 승인 관리</div>
          <div class="muted" style="margin-top:6px">관리자가 배포를 시작한 자산 토큰 입금만 승인합니다. 승인 후 사용자 보유 수량에 반영됩니다.</div>
        </div>
        <div class="tagrow">
          <a class="btn small" href="deposits.html">USDT 입금 승인 관리</a>
          <button id="depRefreshBtn" class="btn small" type="button">새로고침</button>
        </div>
      </div>

      <!-- 요약 카드 -->
      <div class="dep-summary" style="margin-top:14px">
        <div class="card" style="background:#fffbeb;border:1px solid #fde68a">
          <div class="label">승인 대기</div>
          <div class="num" id="sumPending" style="color:#d97706">0</div>
          <div class="label" id="sumPendingAmt">0</div>
        </div>
        <div class="card" style="background:#f0fdf4;border:1px solid #bbf7d0">
          <div class="label">승인 완료</div>
          <div class="num" id="sumApproved" style="color:#059669">0</div>
        </div>
        <div class="card" style="background:#fef2f2;border:1px solid #fecaca">
          <div class="label">거절</div>
          <div class="num" id="sumRejected" style="color:#dc2626">0</div>
        </div>
        <div class="card" style="background:#f9fafb;border:1px solid #e5e7eb">
          <div class="label">전체</div>
          <div class="num" id="sumTotal" style="color:#374151">0</div>
        </div>
      </div>

      <div class="hr"></div>

      <!-- 필터 -->
      <div class="split">
        <div class="field">
          <label for="depStatus">상태</label>
          <select id="depStatus" class="input">
            <option value="all">전체</option>
            <option value="대기" selected>대기 (승인필요)</option>
            <option value="입금완료">입금완료</option>
            <option value="실패">거절/실패</option>
          </select>
        </div>
        <div class="field">
          <label for="depAsset">토큰 자산</label>
          <select id="depAsset" class="input">
            <option value="all">전체 토큰</option>
          </select>
        </div>
        <div class="field" style="grid-column: span 2;">
          <label for="depQ">검색 (address / txid / memo)</label>
          <input id="depQ" class="input" placeholder="지갑주소, txid, 메모 검색..." />
        </div>
      </div>

      <div class="hr"></div>

      <!-- 일괄 작업 바 -->
      <div id="batchBar" class="batch-bar">
        <strong id="batchCount" style="color:#92400e">0건 선택</strong>
        <button id="batchApproveBtn" class="btn small primary" type="button">선택 일괄 승인</button>
        <button id="batchClearBtn" class="btn small" type="button">선택 해제</button>
      </div>

      <!-- 테이블 -->
      <div class="table-wrap">
<table class="table">
          <thead>
            <tr>
              <th class="cb-col"><input type="checkbox" id="depCheckAll" title="전체 선택"></th>
              <th>ID</th>
              <th>상태</th>
              <th>address</th>
              <th>자산</th>
              <th class="right">금액</th>
              <th>txid</th>
              <th style="min-width:160px">관리자 메모</th>
              <th class="timecol">시간</th>
              <th style="min-width:140px">작업</th>
            </tr>
          </thead>
          <tbody id="depRows">
            <tr><td colspan="10" class="center muted">-</td></tr>
          </tbody>
        </table>
      </div>

    </div>
  </div>

</div>
</div>
