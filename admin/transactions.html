<html lang="ko">
<head>
  <meta charset="utf-8">
  <!-- Script-load retry: catches transient QUIC/HTTP3/network failures and retries up to 2x -->
  <script>(function(){var seen={};document.addEventListener('error',function(e){var t=e.target;if(!t||t.tagName!=='SCRIPT')return;var src=t.src||'';if(!src||seen[src]>=2)return;seen[src]=(seen[src]||0)+1;var s=document.createElement('script');s.src=src+(src.indexOf('?')>=0?'&':'?')+'r='+Date.now();s.async=false;setTimeout(function(){document.head.appendChild(s);},400*seen[src]);console.warn('[script-retry]',src,'attempt',seen[src]);},true);})();</script>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>입/출금 거래내역 · SilicaChain</title>
  <link rel="stylesheet" href="css/silica-admin.css?v=20260526v850-image-swap">
  <link rel="shortcut icon" href="/assets/images/logo.svg">
  <style>
    .admin-shell{max-width:1200px;margin:0 auto;padding:22px 16px}
    .admin-top{display:flex;justify-content:space-between;align-items:center;gap:12px}
    .admin-grid{display:grid;grid-template-columns:260px 1fr;gap:14px;margin-top:14px}
    @media (max-width: 900px){.admin-grid{grid-template-columns:1fr}}
    .admin-menu{display:flex;flex-direction:column;gap:10px}
    .admin-menu a{width:100%!important;display:flex!important;justify-content:flex-start!important;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-decoration:none}
    .admin-menu a.active{background:var(--accent-light); border:1px solid var(--amber-border); color:var(--accent-dark)}
    .mono{font-family:ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace}
	
	 .timecol{ white-space:nowrap; min-width:170px; }
  </style>
</head>
<body>

<div id="toast" class="pill hidden"></div>

<div id="adminHeaderMount"></div>
<div class="admin-shell">
<div class="admin-grid">

<div class="card">
<div class="pad admin-menu">

<div class="muted">관리 메뉴</div>

<a class="btn block" href="dashboard.html">대시보드</a>
<a class="btn block" href="assets.html">부동산 자산 등록/관리</a>
<a class="btn block" href="docs.html">문서 관리</a>
<a class="btn block" href="sales.html">매각 관리</a>
<a class="btn block" href="staking.html">스테이킹 설정</a>
<a class="btn block" href="users.html">유저 관리</a>
        <a class="btn block" href="emails.html">단체 메일 발송</a>
<a class="btn block" href="accounting.html">회계 통계</a>
<a class="btn block" href="referrals.html">추천인 관리</a>
<a class="btn block" href="deposits.html">입금 승인 관리</a>
<a class="btn block" href="withdrawals.html">출금 신청 (USDT)</a>
        <a class="btn block" href="token-withdrawals.html">토큰 출금 관리</a>
<a class="btn block active" href="transactions.html">입출금 내역</a>
<a class="btn block" href="contracts.html">전자계약 관리</a>
<a class="btn block" href="settings.html">환경설정</a>
<a class="btn block" href="fx-live.html">실시간 환율</a>

</div>
</div>

    <div class="card">
      <div class="pad">
        <div class="row" style="align-items:flex-end">
          <div>
            <div style="font-weight:950;font-size:16px">wallet_transactions</div>
            <div class="muted" style="margin-top:6px">입금/출금 확정 기록(불변 로그) 조회</div>
          </div>
          <div class="tagrow">
            <button id="txRefreshBtn" class="btn small" type="button">조회</button>
          </div>
        </div>

        <div class="hr"></div>

        <div class="split">
          <div class="field">
            <label for="txKind">구분</label>
            <select id="txKind" class="input">
              <option value="all">all</option>
              <option value="deposit">deposit</option>
              <option value="withdraw">withdraw</option>
            </select>
          </div>
          <div class="field">
            <label for="txStatus">상태</label>
            <select id="txStatus" class="input">
              <option value="all">all</option>
              <option value="대기">대기</option>
              <option value="입금완료">입금완료</option>
              <option value="출금신청">출금신청</option>
              <option value="출금완료">출금완료</option>
              <option value="출금취소">출금취소</option>
              <option value="실패">실패</option>
            </select>
          </div>
          <div class="field">
            <label for="txAsset">자산</label>
            <select id="txAsset" class="input">
              <option value="all">all</option>
              <option value="USDT">USDT</option>
            </select>
          </div>
          <div class="field" style="grid-column: span 2;">
            <label for="txQ">검색(address/txid/memo)</label>
            <input id="txQ" class="input" placeholder="So... / txid / memo" />
          </div>
        </div>

        <div class="hr"></div>

        <div class="table-wrap">
<table class="table">
            <thead>
              <tr>
                <th>ID</th>
                <th>kind</th>
                <th>status</th>
                <th>asset</th>
                <th>address</th>
                <th class="right">amount</th>
                <th>txid</th>
                <th>memo</th>
                <th class="timecol">time</th>
              </tr>
            </thead>
            <tbody id="txRows">
              <tr><td colspan="9" class="center muted">-</td></tr>
            </tbody>
          </table>
        </div>

      </div>
    </div>

  </div>
</div>

<script src="js/admin.i18n.js?v=20260508i18n23-dialogfix"></script>

</html>
