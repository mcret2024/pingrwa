<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <!-- Script-load retry: catches transient QUIC/HTTP3/network failures and retries up to 2x -->
  <script>(function(){var seen={};document.addEventListener('error',function(e){var t=e.target;if(!t||t.tagName!=='SCRIPT')return;var src=t.src||'';if(!src||seen[src]>=2)return;seen[src]=(seen[src]||0)+1;var s=document.createElement('script');s.src=src+(src.indexOf('?')>=0?'&':'?')+'r='+Date.now();s.async=false;setTimeout(function(){document.head.appendChild(s);},400*seen[src]);console.warn('[script-retry]',src,'attempt',seen[src]);},true);})();</script>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>실시간 환율 · SilicaChain</title>
  <link rel="stylesheet" href="css/silica-admin.css?v=20260526v850-image-swap">
  <link rel="shortcut icon" href="img/favicon.png">
  <style>
    .admin-shell{max-width:1200px;margin:0 auto;padding:22px 16px}
    .admin-top{display:flex;justify-content:space-between;align-items:center;gap:12px}
    .admin-grid{display:grid;grid-template-columns:260px 1fr;gap:14px;margin-top:14px}
    @media (max-width: 900px){.admin-grid{grid-template-columns:1fr}}
    .admin-menu{display:flex;flex-direction:column;gap:10px}
    .admin-menu a{width:100% !important;display:flex !important;justify-content:flex-start !important;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .admin-menu a.active{background:var(--accent-light); border:1px solid var(--amber-border); color:var(--accent-dark)}
    .fx-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    @media (max-width: 900px){.fx-grid{grid-template-columns:1fr}}
    .spark{height:90px;border-radius:12px;border:1px solid rgba(255,255,255,.08);background:rgba(0,0,0,.12)}
  </style>
</head>
<body>

<div id="toast" class="pill hidden"></div>

<div id="adminHeaderMount"></div>
<div class="admin-shell">
  <div class="admin-grid">

    <div class="card">
      <div class="pad admin-menu">

        <div class="muted">관리 메뉴</div>

        <a class="btn block" href="dashboard.html">대시보드</a>
        <a class="btn block" href="assets.html">부동산 자산 등록/관리</a>
        <a class="btn block" href="docs.html">문서 관리</a>
        <a class="btn block" href="sales.html">매각 관리</a>
        <a class="btn block" href="staking.html">스테이킹 설정</a>
        <a class="btn block" href="users.html">유저 관리</a>
        <a class="btn block" href="emails.html">단체 메일 발송</a>
<a class="btn block" href="accounting.html">회계 통계</a>
<a class="btn block" href="referrals.html">추천인 관리</a>
        <a class="btn block" href="deposits.html">입금 승인 관리</a>
<a class="btn block" href="withdrawals.html">출금 신청 (USDT)</a>
        <a class="btn block" href="token-withdrawals.html">토큰 출금 관리</a>
        <a class="btn block" href="transactions.html">입출금 내역</a>
        <a class="btn block" href="contracts.html">전자계약 관리</a>
        <a class="btn block" href="settings.html">환경설정</a>
        <a class="btn block active" href="fx-live.html">실시간 환율</a>

      </div>
    </div>

    <div class="card">
      <div class="pad">
        <div class="row" style="align-items:flex-end">
          <div>
            <div style="font-weight:950;font-size:16px">현재 상태</div>
            <div class="muted" id="fxStatus">-</div>
          </div>
          <div class="tagrow">
            <button id="fxLiveRefreshBtn" class="btn small" type="button">새로고침</button>
          </div>
        </div>

        <div class="hr"></div>

        <div class="fx-grid">
          <div class="card" style="background:rgba(0,0,0,.12); border:1px solid rgba(255,255,255,.08); box-shadow:none">
            <div class="pad">
              <div style="font-weight:950">최신 환율(1 USDT = ?)</div>
              <div class="small-note" style="margin-top:6px">settings 값(서비스 실제 적용값) 기준</div>
              <div style="margin-top:10px; overflow:auto">
                <div class="table-wrap">
                <table class="table">
                  <thead>
                    <tr>
                      <th>통화</th>
                      <th class="right">값</th>
                      <th class="right">최종 업데이트</th>
                    </tr>
                  </thead>
                  <tbody id="fxTbody"></tbody>
                </table>
                </div>
              </div>
            </div>
          </div>

          <div class="card" style="background:rgba(0,0,0,.12); border:1px solid rgba(255,255,255,.08); box-shadow:none">
            <div class="pad">
              <div class="split">
                <div class="field">
                  <label for="fxCcySel">통화(히스토리)</label>
                  <select id="fxCcySel" class="input">
                    <option value="KRW">KRW</option>
                    <option value="USD">USD</option>
                    <option value="KZT">KZT</option>
                    <option value="PHP">PHP</option>
                    <option value="GEL">GEL</option>
                    <option value="IDR">IDR</option>
                    <option value="VND">VND</option>
                  </select>
                </div>
                <div class="field">
                  <label for="fxHistLimit">조회 건수</label>
                  <input id="fxHistLimit" class="input" inputmode="numeric" value="240" />
                </div>
              </div>

              <div id="fxSpark" class="spark" style="margin-top:10px"></div>

              <div style="margin-top:10px; overflow:auto; max-height:220px">
                <div class="table-wrap">
                <table class="table">
                  <thead>
                    <tr>
                      <th>시간</th>
                      <th class="right">값</th>
                      <th class="right">provider</th>
                    </tr>
                  </thead>
                  <tbody id="fxHistTbody"></tbody>
                </table>
                </div>
              </div>
              <div class="small-note" style="margin-top:8px">
                * 히스토리는 DB 저장 행 기준으로 조회됩니다.
              </div>
            </div>
          </div>
        </div>

      </div>
    </div>

  </div>
</div>

<script src="js/admin.i18n.js?v=20260508i18n23-dialogfix"></script>
<script src="js/admin.core.js?v=20260526v850-image-swap"></script>
<script src="js/admin.header.js?v=20260526v850-image-swap"></script>
<script src="js/fx-live.js?v=20260326u"></script>
<script>
document.addEventListener("DOMContentLoaded",()=>{
  window.AdminHeader.loadHeader()
})
</script>
</body>
</html>
