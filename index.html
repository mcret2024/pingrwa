<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>RECON RWA</title>
  <script>
    // 지갑 연결 상태에 따라 분기
    //  - 연결됨: user/index.html
    //  - 미연결: user/landing.html (로그인 전에는 랜딩만 노출)
    (function () {
      try {
        var raw = localStorage.getItem('rwa_wallet_v3');
        if (raw) {
          var w = JSON.parse(raw);
          if (w && w.connected && w.token) {
            location.replace('user/index.html');
            return;
          }
        }
      } catch (_) {}
      location.replace('user/landing.html');
    })();
  </script>
  <meta http-equiv="refresh" content="0;url=user/landing.html">
</head>
<body>
  <p>Redirecting to <a href="user/landing.html">RECON RWA</a>...</p>
</body>
</html>
