<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <!-- (2026-05-16 v402) 운영자: '폐쇄 후 안내 페이지를 미리 작성해두고
       폐쇄하면 그대로 전환사용.' state=closed 시 user 측이 본 페이지로
       전환되어 admin/settings.html#winddown 에서 사전 작성한 내용을 표시.
       app_settings.closure_notice_* 키에서 GET /api/silica/closure-notice
       로 fetch.

       redirect 가드 (app.js v403): user 페이지 진입 시 service-state 가
       closed 면 본 페이지로 redirect. closed.html 자체는 redirect 대상
       제외 — 무한 루프 방지.
  -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Service Closed · SilicaChain</title>
  <link rel="shortcut icon" href="assets/images/favicon.png">
  <link rel="stylesheet" href="assets/css/silica-user.css?v=20260617v915-fouc">
<link rel="preload" as="fetch" crossorigin="anonymous" href="/assets/includes/site-header.html?v=20260617v924-nav-trade">
<link rel="preload" as="fetch" crossorigin="anonymous" href="/assets/includes/site-footer.html?v=20260617v924-nav-trade">

  <script>
    (function () {
      try {
        var key = 'rwa_lang_user_v1';
        var raw = String(localStorage.getItem(key) || 'en').trim().toLowerCase();
        var lang = /^(ko|en)$/.test(raw) ? raw : 'en';
        var de = document.documentElement;
        de.lang = lang;
        de.setAttribute('data-rwa-lang', lang);
        de.setAttribute('data-rwa-i18n-ready', '1');
        // (2026-06-17 v921) FOUC fix 일괄 — 로더 먼저(html.rwa-booting-early). app.js 가 해제.
        de.classList.add("rwa-booting-early");
        window.__RWA_I18N_BOOT_LANG__ = lang;
        window.__RWA_SKIP_CLOSED_REDIRECT__ = true;  // app.js 가드 우회.
      } catch (_) {}
    })();
  </script>

  <style>
    body { background:#f8fafc; }
    .closed-shell {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 32px 16px;
    }
    .closed-card {
      max-width: 720px; width: 100%;
      background: #fff;
      border-radius: 18px;
      border: 1px solid #e5e7eb;
      box-shadow: 0 18px 60px rgba(15,23,42,0.08);
      padding: 48px 40px;
    }
    .closed-icon {
      width: 64px; height: 64px;
      border-radius: 50%;
      background: rgba(220,38,38,0.10);
      display: flex; align-items: center; justify-content: center;
      font-size: 32px;
      margin-bottom: 20px;
    }
    .closed-title {
      font-size: 28px;
      font-weight: 900;
      color: #0F172A;
      margin: 0 0 16px;
      line-height: 1.3;
    }
    .closed-body {
      font-size: 15px;
      color: #475569;
      line-height: 1.75;
    }
    .closed-body p { margin: 0 0 12px; }
    .closed-body ul, .closed-body ol { margin: 8px 0 12px 22px; padding: 0; }
    .closed-body li { margin-bottom: 4px; }
    .closed-body a { color: #7C3AED; text-decoration: none; }
    .closed-body a:hover { text-decoration: underline; }
    .closed-meta {
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid #e5e7eb;
      font-size: 12px;
      color: #94a3b8;
    }
    .lang-toggle {
      position: absolute; top: 18px; right: 18px;
      display: flex; gap: 4px;
    }
    .lang-toggle button {
      padding: 4px 12px;
      border: 1px solid #e5e7eb;
      background: #fff;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      color: #94a3b8;
    }
    .lang-toggle button.active { background: #7C3AED; color: #fff; border-color: #7C3AED; }
    @media (max-width: 640px) {
      .closed-card { padding: 32px 24px; }
      .closed-title { font-size: 22px; }
    }
  </style>
</head>
<body data-page="closed">

<div class="lang-toggle">
  <button id="langBtnKo" type="button">KO</button>
  <button id="langBtnEn" type="button">EN</button>
</div>

<div class="closed-shell">
  <div class="closed-card">
    <div class="closed-icon">🛑</div>
    <h1 id="closedTitle" class="closed-title">로딩 중…</h1>
    <div id="closedBody" class="closed-body">
      <p>잠시만 기다려주세요.</p>
    </div>
    <div class="closed-meta">
      <span id="closedFooter">SilicaChain</span>
    </div>
  </div>
</div>

<script>
(function () {
  const detectLang = () => {
    try {
      const raw = String(localStorage.getItem('rwa_lang_user_v1') || 'en').trim().toLowerCase();
      return raw === 'ko' ? 'ko' : 'en';
    } catch (_) { return 'en'; }
  };

  const DEFAULTS = {
    ko: {
      title: '서비스가 종료되었습니다.',
      body: '<p>SilicaChain 서비스가 영구 종료되었습니다.</p>'
          + '<p>마감일까지 회수하지 못한 자금에 대해서는 약관 제10조를 참조해 주시기 바랍니다.</p>'
          + '<p>문의 사항이 있으시면 회사로 직접 연락주십시오.</p>',
      footer: 'SilicaChain — Service has been permanently closed.',
    },
    en: {
      title: 'Service has been closed.',
      body: '<p>The SilicaChain service has been permanently closed.</p>'
          + '<p>Please refer to Article 10 of the Terms regarding any funds that were not recovered before the withdrawal deadline.</p>'
          + '<p>For inquiries, please contact the Company directly.</p>',
      footer: 'SilicaChain — Service has been permanently closed.',
    },
  };

  const apiBase = (() => {
    try {
      const v = localStorage.getItem('rwa_api_base_v1');
      if (v) return String(v).replace(/\/+$/, '');
    } catch (_) {}
    return '';
  })();

  const setLang = (lang) => {
    try { localStorage.setItem('rwa_lang_user_v1', lang); } catch (_) {}
    document.documentElement.setAttribute('data-rwa-lang', lang);
    document.getElementById('langBtnKo').classList.toggle('active', lang === 'ko');
    document.getElementById('langBtnEn').classList.toggle('active', lang === 'en');
    load(lang);
  };

  const load = async (lang) => {
    const titleEl = document.getElementById('closedTitle');
    const bodyEl  = document.getElementById('closedBody');
    const dft = DEFAULTS[lang] || DEFAULTS.en;

    try {
      const r = await fetch(`${apiBase}/api/silica/closure-notice?lang=${encodeURIComponent(lang)}`, {
        method: 'GET', cache: 'no-store',
      });
      const data = await r.json().catch(() => ({}));
      const title = (data?.title || '').trim();
      const body  = (data?.body_html || '').trim();
      titleEl.textContent = title || dft.title;
      bodyEl.innerHTML    = body  || dft.body;
    } catch (e) {
      titleEl.textContent = dft.title;
      bodyEl.innerHTML    = dft.body;
    }
  };

  // 토글 핸들러
  document.getElementById('langBtnKo').addEventListener('click', () => setLang('ko'));
  document.getElementById('langBtnEn').addEventListener('click', () => setLang('en'));

  // 초기 로드
  const lang = detectLang();
  document.getElementById('langBtnKo').classList.toggle('active', lang === 'ko');
  document.getElementById('langBtnEn').classList.toggle('active', lang === 'en');
  load(lang);
})();
</script>

</body>
</html>
