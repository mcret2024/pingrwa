  <script>
    (function () {
      try {
        var key = 'rwa_lang_user_v1';
        var raw = String(localStorage.getItem(key) || 'en').trim().toLowerCase();
        var lang = /^(ko|en)$/.test(raw) ? raw : 'ko';
        var de = document.documentElement;
        de.lang = lang === 'zh' ? 'zh-CN' : lang;
        de.setAttribute('data-rwa-lang', lang);
        de.setAttribute('data-rwa-i18n-ready', lang === 'ko' ? '1' : '0');
        // (2026-06-17 v921) FOUC fix 일괄 — 로더 먼저(html.rwa-booting-early). app.js 가 해제.
        de.classList.add("rwa-booting-early");
        window.__RWA_I18N_BOOT_LANG__ = lang;
      } catch (_) {}
    })();
  </script>
  <style id="rwaI18nBootStyle">
    html[data-rwa-i18n-ready="0"] body { visibility: hidden; }
    html[data-rwa-i18n-ready="1"] body { visibility: visible; }
  </style>
  <script>
    (function () {
      var released = false;
      function release() {
        if (released) return;
        released = true;
        try {
          document.documentElement.setAttribute('data-rwa-i18n-ready', '1');
          document.documentElement.removeAttribute('data-rwa-i18n-pending');
        } catch (_) {}
      }
      window.__RWA_I18N_BOOT_RELEASE__ = release;
      window.addEventListener('load', function () { setTimeout(release, 0); }, { once: true });
      setTimeout(release, 4500);
    })();
  </script>
</head>
