<!-- OTP Modal (preserved IDs for JS compatibility) -->
<div id="otpModal" class="otp-modal hidden" aria-hidden="true">
  <div class="otp-backdrop"></div>
  <div class="otp-panel" role="dialog" aria-modal="true" aria-labelledby="otpTitle">
    <div class="otp-head">
      <div id="otpTitle" class="otp-title">OTP</div>
      <button id="otpCloseBtn" class="btn small" type="button">✕ 닫기</button>
    </div>

    <div id="otpMsg" class="small-note" style="margin:10px 0; color:var(--muted)"></div>

    <div id="otpSetupBox" class="hidden">
      <div class="notice">
        <strong>OTP 등록</strong>
        Google Authenticator 앱에서 QR을 스캔하거나, 아래 키를 수동 등록하세요.
      </div>

      <div class="otp-setup-grid">
        <div>
          <div class="small-note">QR</div>
          <div id="otpQr" class="otp-qr-box"></div>
        </div>
        <div class="otp-setup-fields">
          <div class="small-note">설정 키 (Base32)</div>
          <div id="otpSecret" class="input otp-secret-box" data-no-i18n="1" translate="no">-</div>
          <div class="small-note" style="margin-top:12px">OTP 코드 (6자리)</div>
          <input id="otpCodeInputSetup" class="input otp-code-input" inputmode="numeric" maxlength="6" placeholder="123456" />
          <button id="otpEnableBtn" class="btn primary block" type="button" style="margin-top:10px">등록 완료</button>
        </div>
      </div>
    </div>

    <div id="otpVerifyBox" class="hidden">
      <div class="notice">
        <strong>OTP 인증</strong>
        Google Authenticator의 6자리 코드를 입력하세요.
      </div>
      <div class="small-note" style="margin-top:12px">OTP 코드 (6자리)</div>
      <input id="otpCodeInputVerify" class="input otp-code-input" inputmode="numeric" maxlength="6" placeholder="123456" />
      <button id="otpVerifyBtnDo" class="btn primary block" type="button" style="margin-top:10px">인증</button>
    </div>

    <div class="hr"></div>
    <button id="otpForceLogoutBtn" class="btn danger block" type="button">지갑 해제</button>
  </div>
</div>
